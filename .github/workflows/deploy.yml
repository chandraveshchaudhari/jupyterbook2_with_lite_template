name: Deploy Jupyter Book to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual triggers from the Actions tab

permissions:
  contents: read

# Only one deployment at a time; cancel any in-flight job
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------ #
  # JOB 1: Build the site
  # ------------------------------------------------------------------ #
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build Jupyter Book
        run: jupyter-book build --html

      - name: Detect build output
        id: detect
        run: |
          if [ -d "_build/html" ]; then
            echo "path=_build/html" >> "$GITHUB_OUTPUT"
          elif [ -d "_build/site/public" ]; then
            echo "path=_build/site/public" >> "$GITHUB_OUTPUT"
          elif [ -d "_build/site" ]; then
            echo "path=_build/site" >> "$GITHUB_OUTPUT"
          else
            echo "No build output found. Listing _build:" >&2
            ls -la _build || true
            echo "path=" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "${{ steps.detect.outputs.path }}"

  # ------------------------------------------------------------------ #
  # JOB 2: Deploy to GitHub Pages
  # ------------------------------------------------------------------ #
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
